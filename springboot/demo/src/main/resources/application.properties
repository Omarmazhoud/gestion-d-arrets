spring.application.name=gestion
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pfe}
spring.datasource.username=${DB_USERNAME:omar}
spring.datasource.password=${DB_PASSWORD:omar}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.mail.host=smtp.sendgrid.net
spring.mail.port=2525
spring.mail.username=apikey
spring.mail.password=${MAIL_PASSWORD}
spring.mail.from=${MAIL_FROM:omar.mazhoud.est.ast@gmail.com}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.debug=true
server.address=0.0.0.0

server.port=8080
